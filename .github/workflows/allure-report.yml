name: Allure Report

on:
  workflow_dispatch: # Событие, при котором можно запустить процесс вручную
    inputs:          # Блок с параметрами, которые будут запрошены при ручном запуске
      TESTS_BROWSER:
        description: "Browser to use for tests" # Описание параметра
        required: true                         # Обязательный ли параметр?
        default: "chrome"                      # Значение по умолчанию
      PRODUCT_VERSION:
        description: "Product version"
        required: true
        default: "1.23"

jobs:
  autotests:
    name: Run tests and generate Allure Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.x
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check code style
        if: always()
        run: |
          flake8

      - name: Run Test
        if: always()
        run: pytest --alluredir=allure-results
        continue-on-error: true

      - name: Get Allure history
        uses: actions/checkout@v3
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Allure Report action from marketplace
        uses: simple-elf/allure-report-action@v1.7
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history

      - name: Deploy report to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v2
        env:
          PERSONAL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_BRANCH: gh-pages
          PUBLISH_DIR: allure-history

env: # Блок с переменными окружения
  TESTS_BROWSER: ${{ github.event.inputs.TESTS_BROWSER }} # Значение параметра передается в переменную
  PRODUCT_VERSION: ${{ github.event.inputs.PRODUCT_VERSION }}
  # ... остальные переменные ...
