name: Run Selected Pytest Tests

on:
  workflow_dispatch:
    inputs:
      ALLURE_JOB_RUN_ID:
        description: "TestOps service parameter. Leave blank"
        required: false
      ALLURE_USERNAME:
        description: "TestOps service parameter. Leave blank"
        required: false
      test_files:
        description: 'Test files to run (space-separated paths)'
        required: true
        default: 'tests/test_api.py'
        
env:
  ALLURE_ENDPOINT: https://avigur.qatools.cloud/
  ALLURE_PROJECT_ID: 2
  ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN }}
  ALLURE_JOB_RUN_ID: ${{ github.event.inputs.ALLURE_JOB_RUN_ID }}
  ALLURE_RESULTS: "allure-results"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Install allurectl
      uses: allure-framework/setup-allurectl@v1
      with:
          allure-endpoint: https://avigur.qatools.cloud/
          allure-token: ${{ secrets.ALLURE_TOKEN }}
          allure-project-id: 2

    - name: Run selected tests
      run: |
        echo "Running tests: ${{ github.event.inputs.test_files }}"
        pytest ${{ github.event.inputs.test_files }}
